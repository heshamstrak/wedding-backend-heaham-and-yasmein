<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · Yasmine & Hesham</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fdf4f8;
  --surface:#ffffff;
  --surface2:#fef0f6;
  --border:rgba(0,0,0,.08);
  --shadow:0 1px 3px rgba(180,60,120,.07),0 4px 14px rgba(180,60,120,.06);
  --shadow-lg:0 2px 8px rgba(180,60,120,.10),0 8px 28px rgba(180,60,120,.08);

  --pink:#c9305f;
  --pink2:#a82050;
  --pink-lt:rgba(201,48,95,.09);
  --pink-bd:rgba(201,48,95,.22);
  --pink-soft:#fce8f2;

  --rose:#f472b6;
  --blush:#fdf2f8;

  --text:#1a0e18;
  --text2:#3d2038;
  --dim:rgba(26,14,24,.42);
  --dim2:rgba(26,14,24,.25);
  --danger:#c81a3a;
  --radius:10px;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px;min-height:100vh}

/* ── LOGIN ── */
#loginScreen{
  display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem;
  background:radial-gradient(ellipse at 60% 30%,#fce4ef 0%,#fdf4f8 55%,#f8eef5 100%);
}
#loginCard{
  background:var(--surface);border-radius:18px;padding:2.6rem 2rem;width:100%;max-width:340px;
  text-align:center;box-shadow:var(--shadow-lg);border:1px solid var(--pink-bd);
}
.monogram{
  width:58px;height:58px;border-radius:50%;
  background:linear-gradient(135deg,#e05585,var(--pink));
  display:inline-flex;align-items:center;justify-content:center;
  font-size:1.05rem;font-weight:700;color:#fff;letter-spacing:.05em;
  margin-bottom:1rem;box-shadow:0 4px 16px rgba(201,48,95,.38);
}
#loginCard h1{font-size:1.15rem;font-weight:700;margin-bottom:.3rem;color:var(--text)}
#loginCard .sub{color:var(--dim);font-size:.82rem;margin-bottom:1.8rem}
.field{position:relative;margin-bottom:.75rem}
.field input{
  width:100%;background:#fdf7fa;border:1px solid var(--border);border-radius:var(--radius);
  padding:.75rem 1rem;color:var(--text);font-size:.93rem;outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.field input:focus{border-color:var(--pink-bd);box-shadow:0 0 0 3px rgba(201,48,95,.1)}
.field input::placeholder{color:var(--dim2)}
.btn-primary{
  width:100%;background:linear-gradient(135deg,#e05585,var(--pink));color:#fff;border:none;
  border-radius:var(--radius);padding:.8rem;font-size:.9rem;font-weight:600;cursor:pointer;
  transition:opacity .18s,transform .15s;letter-spacing:.02em;
  box-shadow:0 4px 14px rgba(201,48,95,.32);
}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.btn-primary:active{transform:translateY(0)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.error-banner{
  background:#fff0f4;border:1px solid rgba(201,48,95,.25);color:var(--pink2);
  border-radius:7px;padding:.6rem .9rem;font-size:.82rem;margin-bottom:.75rem;text-align:left;display:none;
}

/* ── DASHBOARD ── */
#dashboard{display:none;flex-direction:column;min-height:100vh}
header{
  background:var(--surface);border-bottom:2px solid var(--pink-soft);
  padding:.8rem 1.4rem;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:20;gap:1rem;
  box-shadow:0 1px 8px rgba(201,48,95,.07);
}
.hd-left{display:flex;align-items:center;gap:.65rem}
.hd-monogram{
  width:30px;height:30px;border-radius:50%;
  background:linear-gradient(135deg,#e05585,var(--pink));
  display:inline-flex;align-items:center;justify-content:center;
  font-size:.65rem;font-weight:700;color:#fff;flex-shrink:0;
}
.hd-title{font-weight:700;font-size:.9rem;color:var(--text)}
.hd-right{display:flex;align-items:center;gap:.9rem}
.hd-date{color:var(--dim);font-size:.78rem;white-space:nowrap}
.btn-logout{
  background:transparent;border:1px solid var(--border);border-radius:6px;
  color:var(--dim);padding:.38rem .85rem;font-size:.78rem;cursor:pointer;
  transition:all .2s;white-space:nowrap;
}
.btn-logout:hover{border-color:var(--danger);color:var(--danger);background:#fff5f7}

main{padding:1.25rem;max-width:1100px;width:100%;margin:0 auto;flex:1;display:flex;flex-direction:column;gap:1.25rem}

/* ── STATS ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:.85rem}
.stat-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:1rem .9rem;text-align:center;
  box-shadow:var(--shadow);transition:box-shadow .2s,transform .2s;
}
.stat-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.stat-card.pink{
  border-color:var(--pink-bd);
  background:linear-gradient(135deg,#e05585,var(--pink));
  box-shadow:0 4px 20px rgba(201,48,95,.32);
}
.stat-card.pink .stat-val{color:#fff}
.stat-card.pink .stat-lbl{color:rgba(255,255,255,.72)}
.stat-icon{font-size:1.25rem;margin-bottom:.4rem;line-height:1}
.stat-val{font-size:1.7rem;font-weight:700;line-height:1;margin-bottom:.25rem;color:var(--text)}
.stat-lbl{font-size:.68rem;color:var(--dim);text-transform:uppercase;letter-spacing:.07em}

/* ── TABLE PANEL ── */
.panel{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  overflow:hidden;box-shadow:var(--shadow);
}
.panel-controls{
  display:flex;align-items:center;gap:.7rem;padding:.9rem 1.1rem;
  border-bottom:1px solid var(--border);flex-wrap:wrap;background:#fffafc;
}
#searchInput{
  flex:1;min-width:150px;background:var(--surface);border:1px solid var(--border);
  border-radius:7px;padding:.52rem .85rem;color:var(--text);font-size:.86rem;outline:none;
  transition:border-color .2s,box-shadow .2s;
}
#searchInput:focus{border-color:var(--pink-bd);box-shadow:0 0 0 3px rgba(201,48,95,.08)}
#searchInput::placeholder{color:var(--dim2)}
.btn-export{
  background:var(--pink-lt);border:1px solid var(--pink-bd);border-radius:7px;
  color:var(--pink);padding:.52rem 1.05rem;font-size:.8rem;font-weight:600;cursor:pointer;
  white-space:nowrap;transition:background .2s;
}
.btn-export:hover{background:rgba(201,48,95,.16)}
.btn-refresh{
  background:transparent;border:1px solid var(--border);border-radius:7px;
  color:var(--dim);padding:.52rem .85rem;font-size:.8rem;cursor:pointer;transition:all .2s;
}
.btn-refresh:hover{border-color:rgba(0,0,0,.18);color:var(--text);background:#f9f5f8}

.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:560px}
thead th{
  background:#fef0f6;padding:.65rem 1rem;text-align:left;
  font-size:.68rem;font-weight:700;color:var(--pink2);
  text-transform:uppercase;letter-spacing:.07em;white-space:nowrap;
  border-bottom:1px solid rgba(201,48,95,.1);
}
thead th.center{text-align:center}
tbody tr{border-bottom:1px solid rgba(0,0,0,.045);transition:background .12s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#fff6fb}
td{padding:.75rem 1rem;font-size:.85rem;vertical-align:top}
td.center{text-align:center;color:var(--dim)}
td.total{text-align:center;font-weight:600}
td.name{font-weight:600;color:var(--text)}
td.msg{color:var(--dim);font-size:.8rem;max-width:200px;word-break:break-word;line-height:1.4}
td.date{color:var(--dim);font-size:.78rem;white-space:nowrap}
td.idx{color:var(--dim2);font-size:.75rem;text-align:center}
.dim-val{color:var(--dim2)}
.badge{
  display:inline-block;padding:.22rem .6rem;border-radius:20px;font-size:.7rem;font-weight:700;
  background:linear-gradient(135deg,#e05585,var(--pink));color:#fff;letter-spacing:.02em;
  box-shadow:0 2px 6px rgba(201,48,95,.28);
}

.empty-state{text-align:center;padding:3rem 1rem;color:var(--dim);font-size:.9rem}
.empty-state .icon{font-size:2rem;margin-bottom:.75rem;opacity:.5}

/* ── STATES ── */
#loadingState{text-align:center;padding:3rem 1rem;color:var(--dim)}
.spinner{
  display:inline-block;width:28px;height:28px;
  border:2px solid rgba(201,48,95,.15);border-top-color:var(--pink);
  border-radius:50%;animation:spin .8s linear infinite;margin-bottom:.75rem;
}
@keyframes spin{to{transform:rotate(360deg)}}
#errorState{text-align:center;padding:2.5rem 1rem}
#errorMsg{color:var(--danger);font-size:.88rem;margin-bottom:.9rem}
.btn-retry{
  background:transparent;border:1px solid rgba(200,26,58,.28);color:var(--danger);
  border-radius:6px;padding:.5rem 1.1rem;cursor:pointer;font-size:.82rem;transition:background .2s;
}
.btn-retry:hover{background:rgba(200,26,58,.06)}

/* ── RESULT COUNT ── */
.result-count{font-size:.75rem;color:var(--dim);margin-left:auto;white-space:nowrap}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  main{padding:.9rem .75rem;gap:1rem}
  header{padding:.7rem .9rem}
  .hd-date{display:none}
  .stat-val{font-size:1.45rem}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .stats-grid .stat-card:last-child{grid-column:span 2}
  td{padding:.6rem .75rem}
  .panel-controls{padding:.75rem .9rem}
}
</style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="loginScreen">
  <div id="loginCard">
    <div class="monogram">YH</div>
    <h1>Wedding Admin</h1>
    <p class="sub">Yasmine &amp; Hesham · 15.07.2026</p>
    <form id="loginForm" onsubmit="doLogin(event)">
      <div class="error-banner" id="loginError">Incorrect password. Please try again.</div>
      <div class="field">
        <input type="password" id="pwInput" placeholder="Enter admin password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-primary" id="loginBtn">Login</button>
    </form>
  </div>
</div>

<!-- ══ DASHBOARD ══ -->
<div id="dashboard">
  <header>
    <div class="hd-left">
      <span class="hd-monogram">YH</span>
      <span class="hd-title">Wedding Admin</span>
    </div>
    <div class="hd-right">
      <span class="hd-date">15 · 07 · 2026</span>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </header>

  <main>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">👁️</div>
        <div class="stat-val" id="sVisits">—</div>
        <div class="stat-lbl">Total Visits</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">💌</div>
        <div class="stat-val" id="sRsvps">—</div>
        <div class="stat-lbl">RSVPs</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🧑</div>
        <div class="stat-val" id="sAdults">—</div>
        <div class="stat-lbl">Adults</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🧒</div>
        <div class="stat-val" id="sChildren">—</div>
        <div class="stat-lbl">Children</div>
      </div>
      <div class="stat-card pink">
        <div class="stat-icon">🎊</div>
        <div class="stat-val" id="sTotal">—</div>
        <div class="stat-lbl">Total Guests</div>
      </div>
    </div>

    <!-- RSVP Table -->
    <div class="panel">
      <div class="panel-controls">
        <input type="search" id="searchInput" placeholder="Search by name…" oninput="filterTable()" autocomplete="off">
        <span class="result-count" id="resultCount"></span>
        <button class="btn-refresh" onclick="loadDashboard()" title="Refresh">↻ Refresh</button>
        <button class="btn-export" onclick="exportCSV()">⬇ Export CSV</button>
      </div>

      <div id="loadingState">
        <div class="spinner"></div>
        <div>Loading…</div>
      </div>

      <div id="errorState" style="display:none">
        <div id="errorMsg">Failed to load data.</div>
        <button class="btn-retry" onclick="loadDashboard()">Try again</button>
      </div>

      <div id="tableContainer" style="display:none">
        <div class="table-wrap">
          <table id="rsvpTable">
            <thead>
              <tr>
                <th class="center">#</th>
                <th>Name</th>
                <th class="center">Adults</th>
                <th class="center">Children</th>
                <th class="center">Total</th>
                <th>Message</th>
                <th>Submitted At</th>
              </tr>
            </thead>
            <tbody id="rsvpBody"></tbody>
          </table>
        </div>
        <div class="empty-state" id="emptyState" style="display:none">
          <div class="icon">💌</div>
          <div>No RSVPs yet</div>
        </div>
      </div>
    </div>

  </main>
</div>

<script>
const getToken = () => localStorage.getItem('wad_token');

function init() {
  if (getToken()) {
    showDashboard();
    loadDashboard();
  }
}

async function doLogin(e) {
  e.preventDefault();
  const pw = document.getElementById('pwInput').value;
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('loginError');

  btn.textContent = 'Checking…';
  btn.disabled = true;
  err.style.display = 'none';

  try {
    const res = await fetch('/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw }),
    });

    if (res.ok) {
      const data = await res.json();
      localStorage.setItem('wad_token', data.token);
      showDashboard();
      loadDashboard();
    } else {
      err.style.display = 'block';
      btn.textContent = 'Login';
      btn.disabled = false;
      document.getElementById('pwInput').select();
    }
  } catch {
    err.textContent = 'Connection error. Is the server running?';
    err.style.display = 'block';
    btn.textContent = 'Login';
    btn.disabled = false;
  }
}

function showDashboard() {
  document.getElementById('loginScreen').style.display = 'none';
  const db = document.getElementById('dashboard');
  db.style.display = 'flex';
}

function logout() {
  localStorage.removeItem('wad_token');
  location.reload();
}

let allRsvps = [];

async function loadDashboard() {
  const loading = document.getElementById('loadingState');
  const errorState = document.getElementById('errorState');
  const tableContainer = document.getElementById('tableContainer');

  loading.style.display = 'block';
  errorState.style.display = 'none';
  tableContainer.style.display = 'none';

  try {
    const res = await fetch('/wedding/stats', {
      headers: { 'x-admin-token': getToken() },
    });

    if (res.status === 401) {
      logout();
      return;
    }
    if (!res.ok) throw new Error(`Server returned ${res.status}`);

    const data = await res.json();

    document.getElementById('sVisits').textContent = fmt(data.visitsCount);
    document.getElementById('sRsvps').textContent = fmt(data.rsvpsCount);
    document.getElementById('sAdults').textContent = fmt(data.totalAdults);
    document.getElementById('sChildren').textContent = fmt(data.totalChildren);
    document.getElementById('sTotal').textContent = fmt(data.totalGuests);

    allRsvps = data.rsvps || [];
    renderTable(allRsvps);

    loading.style.display = 'none';
    tableContainer.style.display = 'block';
  } catch (err) {
    loading.style.display = 'none';
    errorState.style.display = 'block';
    document.getElementById('errorMsg').textContent =
      'Failed to load data. ' + err.message;
  }
}

function renderTable(rsvps) {
  const body = document.getElementById('rsvpBody');
  const empty = document.getElementById('emptyState');
  const count = document.getElementById('resultCount');

  const total = allRsvps.length;
  const shown = rsvps.length;
  count.textContent = shown === total
    ? (total === 0 ? '' : `${total} response${total !== 1 ? 's' : ''}`)
    : `${shown} of ${total}`;

  if (!rsvps.length) {
    body.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  body.innerHTML = rsvps.map((r, i) => `
    <tr>
      <td class="idx">${i + 1}</td>
      <td class="name">${esc(r.name)}</td>
      <td class="center">${r.adults}</td>
      <td class="center">${r.children}</td>
      <td class="total"><span class="badge">${r.adults + r.children}</span></td>
      <td class="msg">${r.message ? esc(r.message) : '<span class="dim-val">—</span>'}</td>
      <td class="date">${fmtDate(r.createdAt)}</td>
    </tr>
  `).join('');
}

function filterTable() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  renderTable(q ? allRsvps.filter(r => r.name.toLowerCase().includes(q)) : allRsvps);
}

function exportCSV() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const rows = q ? allRsvps.filter(r => r.name.toLowerCase().includes(q)) : allRsvps;

  const lines = [
    ['#', 'Name', 'Adults', 'Children', 'Total', 'Message', 'Submitted At'],
    ...rows.map((r, i) => [
      i + 1,
      r.name,
      r.adults,
      r.children,
      r.adults + r.children,
      r.message || '',
      fmtDate(r.createdAt),
    ]),
  ].map(row => row.map(c => `"${String(c).replace(/"/g, '""')}"`).join(','));

  const csv = '﻿' + lines.join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `rsvp-${new Date().toISOString().slice(0, 10)}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function fmt(n) {
  return typeof n === 'number' ? n.toLocaleString() : '—';
}

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return (
    d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }) +
    ' · ' +
    d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' })
  );
}

init();
</script>
</body>
</html>
